<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#ffffff;
    padding:20px;
    max-width:450px;
    margin:auto;
}

.schedule-card{
    border-radius:32px;
    padding:24px;
    margin-bottom:20px;
    border:1px solid rgba(0,0,0,.06);
}

.current{
    background:#f3f8e8;
}

.next{
    background:#eef5ff;
}

.time{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:34px;
    font-weight:700;
    margin-bottom:15px;
}

.current .time{
    color:#5c8b2d;
}

.next .time{
    color:#3f78c2;
}

.subtitle{
    font-size:18px;
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:20px;
}

.current .subtitle{
    color:#5c8b2d;
}

.next .subtitle{
    color:#3f78c2;
}

.grid-2{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.grid-4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.station{
    background:white;
    border-radius:22px;
    padding:16px;
    border:1px solid #e8edf3;
    text-align:center;
}

.station.small{
    padding:12px 8px;
}

.placeholder{
    width:80px;
    height:80px;
    border-radius:50%;
    border:2px dashed #d5dce5;
    background:#f8fafc;
    margin:0 auto 12px;
}

.small .placeholder{
    width:55px;
    height:55px;
    margin-bottom:10px;
}

.station-title{
    font-size:20px;
    font-weight:700;
}

.small .station-title{
    font-size:13px;
}

.event{
    margin-top:14px;
    background:white;
    border-radius:22px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:14px;
}

.event-icon{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#f3ebff;
    border:2px dashed #d8c6ff;
    flex-shrink:0;
}

.event-title{
    color:#7c3aed;
    font-size:28px;
    font-weight:700;
}

.event-time{
    color:#7c3aed;
    font-weight:600;
}
</style>
</head>
<body>

<div class="schedule-card current">

    <div class="time">
        🕒 12:00–12:25
    </div>

    <div class="subtitle">
        Работающие станции
    </div>

    <div class="grid-2">

        <div class="station">
            <div class="placeholder"></div>
            <div class="station-title">КАРАОКЕ</div>
        </div>

        <div class="station">
            <div class="placeholder"></div>
            <div class="station-title">СТРОЙКА</div>
        </div>

        <div class="station">
            <div class="placeholder"></div>
            <div class="station-title">ТЕАТР</div>
        </div>

        <div class="station">
            <div class="placeholder"></div>
            <div class="station-title">СІЛЬПО</div>
        </div>

    </div>

</div>

<div class="schedule-card next">

    <div class="time">
        🕒 12:30–12:55
    </div>

    <div class="subtitle">
        Будущие станции
    </div>

    <div class="grid-4">

        <div class="station small">
            <div class="placeholder"></div>
            <div class="station-title">ТВ</div>
        </div>

        <div class="station small">
            <div class="placeholder"></div>
            <div class="station-title">EVA</div>
        </div>

        <div class="station small">
            <div class="placeholder"></div>
            <div class="station-title">ТУРИЗМ</div>
        </div>

        <div class="station small">
            <div class="placeholder"></div>
            <div class="station-title">ЛІТАК</div>
        </div>

    </div>

    <div class="event">

        <div class="event-icon"></div>

        <div>
            <div class="event-title">ДР</div>
            <div class="event-time">12:35–12:40</div>
        </div>

    </div>

</div>

</body>
</html>
