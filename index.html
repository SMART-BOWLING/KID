<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Кідландія - Розклад</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: "Arial Rounded MT Bold", "Nunito", "Trebuchet MS", Arial, sans-serif;
            color: #101733;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: transparent;
            border-radius: 36px;
            padding: 24px 28px 40px;
            position: relative;
        }

        .cloud {
            position: absolute;
            opacity: .72;
            pointer-events: none;
        }
        .cloud-left {
            left: -10px;
            top: 140px;
            width: 76px;
            height: 39px;
            color: #fbf3cd;
        }
        .cloud-right {
            right: -6px;
            top: 130px;
            width: 82px;
            height: 42px;
            color: #e3f1fe;
        }

        .logo {
            position: relative;
            width: max-content;
            margin: 20px auto 28px;
            font-size: 45px;
            font-weight: 1000;
            letter-spacing: 1px;
            line-height: .9;
            text-transform: uppercase;
        }
        .logo span {
            display: inline-block;
            text-shadow: 0 2px 1px rgba(0, 0, 0, .06);
        }
        .star {
            position: absolute;
            left: 52px;
            top: -26px;
            width: 23px;
            height: 23px;
            color: #ffc542;
            filter: drop-shadow(0 2px 1px rgba(0, 0, 0, .12));
        }

        .panel {
            border: 1.5px solid;
            border-radius: 27px;
            padding: 23px 17px 21px;
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(35, 65, 104, .08);
        }
        .panel + .panel {
            margin-top: 14px;
        }
        .panel.active {
            background: #f5fadf;
            border-color: #e0ecad;
        }
        .panel.next {
            background: #edf7ff;
            border-color: #c8e4f7;
            padding: 23px 12px 21px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 0 16px;
            font-size: 34px;
            font-weight: 1000;
            line-height: 1;
        }
        .active .time-row,
        .active .section-title {
            color: #2e871d;
        }
        .next .time-row,
        .next .section-title {
            color: #1279bf;
        }

        .clock {
            width: 38px;
            height: 38px;
            flex: 0 0 auto;
        }

        .section-title {
            margin: 0 0 13px;
            font-size: 18px;
            font-weight: 1000;
            letter-spacing: .2px;
            text-transform: uppercase;
        }

        .grid-current {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .grid-next {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 4px;
        }
        .grid-next .wide {
            margin-top: 5px;
        }

        .station {
            display: grid;
            place-items: center;
            min-width: 0;
            background: #ffffff;
            border: 1.5px solid rgba(183, 205, 141, .48);
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(35, 65, 104, .05);
            min-height: 132px;
            height: auto;
            padding: 11px 8px 12px;
        }
        .station.small {
            min-height: 119px;
            height: auto;
            padding: 9px 4px 11px;
            border-color: rgba(174, 210, 235, .7);
            border-radius: 15px;
        }
        .station.wide {
            grid-column: 1 / -1;
            min-height: 80px;
            height: auto;
            display: flex;
            justify-content: flex-start;
            gap: 23px;
            padding: 10px 44px;
            border-color: rgba(174, 210, 235, .7);
        }

        .badge {
            width: 83px;
            height: 83px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            margin-bottom: 9px;
            font-size: 46px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .big .badge {
            width: 87px;
            height: 87px;
        }
        .small .badge {
            width: 71px;
            height: 71px;
            margin-bottom: 8px;
            font-size: 38px;
        }
        .wide .badge {
            width: 66px;
            height: 66px;
            margin: 0;
            flex: 0 0 auto;
            font-size: 40px;
        }
        
        .badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .station-name {
            max-width: 100%;
            color: #101733;
            font-size: 18px;
            font-weight: 1000;
            line-height: 1.2;
            text-align: center;
            text-transform: uppercase;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            padding: 0 2px;
            width: 100%;
        }
        .small .station-name {
            font-size: 12px;
            line-height: 1.1;
        }
        .wide .station-name {
            color: #7a32bf;
            font-size: 20px;
            line-height: 1.1;
            text-align: left;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .station-time {
            display: block;
            margin-top: 8px;
            color: #7a32bf;
            font-size: 14px;
            font-weight: 1000;
        }

        .badge-default { background: #f0f0f0; }
        .badge-default-2 { background: #e8f0fe; }
        .badge-default-3 { background: #fce8e8; }
        .badge-default-4 { background: #e8fce8; }

        .loading-state {
            text-align: center;
            padding: 40px 20px;
            color: #a2a2a2;
            font-size: 18px;
            font-weight: 600;
        }
        .loading-state .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0ecad;
            border-top-color: #2e871d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 30px 20px;
            color: #a2a2a2;
            font-size: 16px;
        }

        .update-time {
            text-align: center;
            color: #a2a2a2;
            font-size: 11px;
            margin-top: 14px;
            opacity: 0.7;
        }

        /* Адаптивные стили */
        @media (max-width: 480px) {
            .container {
                padding: 16px 17px 30px;
                border-radius: 20px;
            }
            .logo {
                font-size: 39px;
            }
            .time-row {
                font-size: 29px;
            }
            .station.wide {
                padding-inline: 28px;
                gap: 18px;
            }
            .station {
                min-height: 120px;
                padding: 9px 6px 10px;
            }
            .big .badge {
                width: 75px;
                height: 75px;
                font-size: 40px;
            }
            .station-name {
                font-size: 15px;
            }
            .small .station-name {
                font-size: 10px;
            }
            .wide .station-name {
                font-size: 16px;
            }
            .station.small {
                min-height: 100px;
                padding: 7px 3px 8px;
            }
            .small .badge {
                width: 60px;
                height: 60px;
                font-size: 32px;
            }
            .grid-current {
                gap: 8px;
            }
            .grid-next {
                gap: 3px;
            }
        }

        @media (max-width: 380px) {
            .station {
                min-height: 110px;
                padding: 7px 4px 8px;
            }
            .big .badge {
                width: 65px;
                height: 65px;
                font-size: 34px;
            }
            .station-name {
                font-size: 13px;
            }
            .small .station-name {
                font-size: 9px;
            }
            .station.small {
                min-height: 90px;
                padding: 6px 2px 8px;
            }
            .small .badge {
                width: 50px;
                height: 50px;
                font-size: 28px;
                margin-bottom: 5px;
            }
            .grid-current {
                gap: 6px;
            }
            .station.wide {
                padding-inline: 15px;
                gap: 12px;
                min-height: 65px;
            }
            .wide .badge {
                width: 50px;
                height: 50px;
                font-size: 28px;
            }
            .wide .station-name {
                font-size: 14px;
            }
            .time-row {
                font-size: 24px;
                gap: 8px;
            }
            .clock {
                width: 30px;
                height: 30px;
            }
        }

        @media (max-width: 340px) {
            .station {
                min-height: 95px;
                padding: 5px 2px 6px;
            }
            .big .badge {
                width: 55px;
                height: 55px;
                font-size: 28px;
                margin-bottom: 5px;
            }
            .station-name {
                font-size: 11px;
            }
            .small .station-name {
                font-size: 8px;
            }
            .station.small {
                min-height: 75px;
                padding: 4px 2px 6px;
            }
            .small .badge {
                width: 40px;
                height: 40px;
                font-size: 22px;
                margin-bottom: 4px;
            }
            .grid-current {
                gap: 4px;
            }
            .grid-next {
                gap: 2px;
            }
            .station.wide {
                padding-inline: 10px;
                gap: 8px;
                min-height: 55px;
            }
            .wide .badge {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }
            .wide .station-name {
                font-size: 12px;
            }
            .station-time {
                font-size: 10px;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="cloud cloud-left" viewBox="0 0 96 48" aria-hidden="true">
            <path fill="currentColor" d="M16 38h64c8 0 14-6 14-13s-6-13-14-13c-2 0-4 1-6 1C70 5 62 0 52 0 40 0 31 7 28 18c-3-2-7-3-11-3C8 15 1 22 1 31s7 7 15 7z"/>
        </svg>
        <svg class="cloud cloud-right" viewBox="0 0 96 48" aria-hidden="true">
            <path fill="currentColor" d="M16 38h64c8 0 14-6 14-13s-6-13-14-13c-2 0-4 1-6 1C70 5 62 0 52 0 40 0 31 7 28 18c-3-2-7-3-11-3C8 15 1 22 1 31s7 7 15 7z"/>
        </svg>

        <h1 class="logo" aria-label="Кідландія">
            <svg class="star" viewBox="0 0 32 32" aria-hidden="true">
                <path fill="currentColor" d="m16 1.8 4.2 8.7 9.5 1.4-6.9 6.7 1.7 9.5L16 23.6l-8.5 4.5 1.7-9.5-6.9-6.7 9.5-1.4L16 1.8z"/>
            </svg>
            <span style="color:#7b2fc0">К</span><span style="color:#f06a2f">і</span><span style="color:#6bb72f">д</span><span style="color:#ffc928">л</span><span style="color:#258ad2">а</span><span style="color:#e33b85">н</span><span style="color:#8038bd">д</span><span style="color:#eb3c73">і</span><span style="color:#50bec3">я</span>
        </h1>

        <div id="scheduleContainer">
            <div class="loading-state">
                <div class="spinner"></div>
                <div>Завантаження розкладу...</div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZfa0njEtfXFJLWfH4p23Ge7oBtbMkDl5C1fQ3ORH8wB0Sy4l-aAq1hLP1DbIznkknMA/exec';

        async function fetchSchedule() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error(`Помилка: ${response.status}`);
                const data = await response.json();
                console.log('📦 Дані:', data);
                return data;
            } catch (err) {
                console.error('❌ Помилка:', err);
                return { success: false, error: err.message };
            }
        }

        function getKyivTime() {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('uk-UA', {
                timeZone: 'Europe/Kiev',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            const timeStr = formatter.format(now);
            const parts = timeStr.split(':');
            const date = new Date();
            date.setHours(parseInt(parts[0]) || 0);
            date.setMinutes(parseInt(parts[1]) || 0);
            date.setSeconds(0);
            return date;
        }

        function parseTimeToMinutes(timeStr) {
            if (!timeStr) return -1;
            const parts = timeStr.split(':');
            if (parts.length >= 2) {
                const hours = parseInt(parts[0]);
                const minutes = parseInt(parts[1]);
                if (!isNaN(hours) && !isNaN(minutes)) {
                    return hours * 60 + minutes;
                }
            }
            return -1;
        }

        function getStationStatus(timeFrom, timeTo, currentTime) {
            const from = parseTimeToMinutes(timeFrom);
            const to = parseTimeToMinutes(timeTo);
            const current = currentTime.getHours() * 60 + currentTime.getMinutes();
            
            if (from === -1 || to === -1) return 'unknown';
            
            if (to < from) {
                if (current >= from || current < to) return 'active';
                if (current < from) return 'future';
                return 'past';
            }
            
            if (current >= from && current < to) return 'active';
            if (current < from) return 'future';
            return 'past';
        }

        function getStationStyle(stationName) {
            const name = stationName.toUpperCase();
            const map = {
                'КАРАОКЕ': { emoji: '🎤', cls: 'mic' },
                'СТРОЙКА': { emoji: '🧱', cls: 'build' },
                'ТЕАТР': { emoji: '🎭', cls: 'theatre' },
                'СІЛЬПО': { emoji: 'Сільпо', cls: 'silpo' },
                'СИЛЬПО': { emoji: 'Сільпо', cls: 'silpo' },
                'ТВ': { emoji: '📺', cls: 'tv' },
                'EVA': { emoji: 'eva', cls: 'eva' },
                'ЕВА': { emoji: 'eva', cls: 'eva' },
                'ТУРИЗМ': { emoji: '🌍🧳', cls: 'trip' },
                'ТУРАГЕНЦИЯ': { emoji: '🌍🧳', cls: 'trip' },
                'ЛІТАК': { emoji: '✈️', cls: 'plane' },
                'САМОЛЕТ': { emoji: '✈️', cls: 'plane' },
                'ДР': { emoji: '🎂', cls: 'dr' }
            };
            
            for (const [key, value] of Object.entries(map)) {
                if (name === key) {
                    return value;
                }
            }
            
            const defaultClasses = ['badge-default', 'badge-default-2', 'badge-default-3', 'badge-default-4'];
            const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            return { 
                emoji: name.charAt(0), 
                cls: defaultClasses[hash % defaultClasses.length] 
            };
        }

        function renderSchedule(data) {
            const container = document.getElementById('scheduleContainer');
            
            if (!data.success) {
                container.innerHTML = `
                    <div class="panel" style="border-color:#ffcdd2;background:#fff5f5;padding:30px;text-align:center;">
                        <div style="font-size:20px;margin-bottom:10px;">❌</div>
                        <div style="font-weight:600;color:#c62828;">Помилка: ${data.error || 'Невідома помилка'}</div>
                    </div>
                `;
                return;
            }

            if (!data.rows || data.rows.length === 0) {
                container.innerHTML = `
                    <div class="panel" style="border-color:#e0e0e0;background:#fafafa;padding:30px;text-align:center;">
                        <div style="font-size:20px;margin-bottom:10px;">📋</div>
                        <div style="font-weight:600;color:#666;">Немає даних для відображення</div>
                    </div>
                `;
                return;
            }

            const kyivTime = getKyivTime();
            const currentTimeStr = kyivTime.toLocaleString('uk-UA', { 
                timeZone: 'Europe/Kiev',
                hour: '2-digit',
                minute: '2-digit'
            });

            const filteredRows = data.rows.filter(row => {
                const status = getStationStatus(row.timeFrom, row.timeTo, kyivTime);
                return status === 'active' || status === 'future';
            });

            if (filteredRows.length === 0) {
                container.innerHTML = `
                    <div class="panel" style="border-color:#e0e0e0;background:#fafafa;padding:30px;text-align:center;">
                        <div style="font-size:20px;margin-bottom:10px;">⏰</div>
                        <div style="font-weight:600;color:#666;">Немає активних або майбутніх станцій</div>
                        <div style="font-size:12px;color:#999;margin-top:8px;">Поточний час: ${currentTimeStr}</div>
                    </div>
                `;
                return;
            }

            const groups = {};
            filteredRows.forEach(row => {
                const key = `${row.timeFrom}–${row.timeTo}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(row);
            });

            const sortedKeys = Object.keys(groups).sort((a, b) => {
                return a.split('–')[0].localeCompare(b.split('–')[0]);
            });

            let html = '';

            sortedKeys.forEach((key) => {
                const rows = groups[key];
                const timeFrom = key.split('–')[0];
                const timeTo = key.split('–')[1];
                const status = getStationStatus(timeFrom, timeTo, kyivTime);
                
                const isActive = status === 'active';
                const panelClass = isActive ? 'active' : 'next';
                const title = isActive ? 'Працюючі станції' : 'Майбутні станції';

                const stationItems = rows.filter(r => r.station !== 'ДР');
                const eventRow = rows.find(r => r.station === 'ДР');

                html += `<section class="panel ${panelClass}" aria-label="${title}">`;
                html += `<div class="time-row">`;
                html += `<svg class="clock" viewBox="0 0 48 48" aria-hidden="true">
                            <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="4"/>
                            <path d="M24 12v13l9 6" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                        </svg>`;
                html += `<span>${key}</span>`;
                html += `</div>`;
                html += `<p class="section-title">${title}</p>`;

                if (isActive) {
                    html += `<div class="grid-current">`;
                    stationItems.forEach(st => {
                        const style = getStationStyle(st.station);
                        const logoHtml = st.logo ? `<img src="${st.logo}" alt="${st.station}">` : style.emoji;
                        html += `<article class="station big">`;
                        html += `<div class="badge ${style.cls}">${logoHtml}</div>`;
                        html += `<div class="station-name">${st.station}</div>`;
                        html += `</article>`;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="grid-next">`;
                    const displayStations = stationItems.slice(0, 8);
                    displayStations.forEach(st => {
                        const style = getStationStyle(st.station);
                        const logoHtml = st.logo ? `<img src="${st.logo}" alt="${st.station}">` : style.emoji;
                        html += `<article class="station small">`;
                        html += `<div class="badge ${style.cls}">${logoHtml}</div>`;
                        html += `<div class="station-name">${st.station}</div>`;
                        html += `</article>`;
                    });
                    html += `</div>`;
                }

                if (eventRow) {
                    const style = getStationStyle(eventRow.station);
                    const logoHtml = eventRow.logo ? `<img src="${eventRow.logo}" alt="${eventRow.station}">` : style.emoji;
                    html += `<div class="grid-next">`;
                    html += `<article class="station wide">`;
                    html += `<div class="badge ${style.cls}">${logoHtml}</div>`;
                    html += `<div class="station-name">${eventRow.station}<span class="station-time">${eventRow.timeFrom}-${eventRow.timeTo}</span></div>`;
                    html += `</article>`;
                    html += `</div>`;
                }

                html += `</section>`;
            });

            html += `<div class="update-time">🔄 Оновлено: ${currentTimeStr} (Київ)</div>`;
            container.innerHTML = html;
        }

        async function init() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <div>Завантаження розкладу...</div>
                </div>
            `;
            
            const data = await fetchSchedule();
            renderSchedule(data);
            
            setInterval(async () => {
                const data = await fetchSchedule();
                renderSchedule(data);
            }, 30000);
        }

        init();
    </script>
</body>
</html>
